services:
  - type: web
    name: mtools
    runtime: static
    branch: deploy
    buildCommand: echo "Serving prebuilt assets from deploy branch"
    staticPublishPath: apps/web/dist
    previews:
      generation: automatic
      branch: main
    buildFilter:
      paths:
        - apps/web/**
        - packages/**
        - package.json
        - bun.lock
        - bunfig.toml
        - tsconfig.base.json
        - scripts/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
